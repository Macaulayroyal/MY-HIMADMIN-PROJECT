<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>HIM.CLOTHIERS - Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --brand-color: #6F4D38;
            --brand-hover: #5a3f2e;
            --brand-light: rgba(111, 77, 56, 0.1);
            --bg-white: #ffffff;
            --bg-light: #f8f9fa;
            --text-primary: #1a1a1a;
            --text-secondary: #6c757d;
            --border-color: #e9ecef;
            --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f5f0eb 0%, #ffffff 100%); 
            color: var(--text-primary); 
            min-height: 100vh; 
        }
        
        .login-page { display: flex; min-height: 100vh; }
        .login-left { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 60px; 
            background: var(--bg-white); 
        }
        .login-brand { 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-image: url(img/product.jpg);
            height: 200px;
            width: 200px;
            border-radius: 200px;
        }
        .login-form-container { width: 100%; max-width: 400px; text-align: center; }

        /* Circular Profile Uploader */
        .profile-upload-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            cursor: pointer;
        }
        .profile-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--bg-light);
            border: 2px solid var(--brand-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .profile-circle:hover { transform: scale(1.03); }
        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-circle svg { color: var(--brand-color); width: 40px; height: 40px; }
        #imageInput { display: none; } /* Hidden input */

        .login-title { font-size: 28px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); text-align: left;}
        .login-subtitle { color: var(--text-secondary); margin-bottom: 32px; font-size: 14px; text-align: left;}
        
        .form-group { margin-bottom: 20px; text-align: left;}
        .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; text-transform: uppercase; }
        .form-input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid var(--border-color); 
            border-radius: var(--radius-sm); 
            font-size: 15px; 
        }
        
        .btn { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            padding: 14px 24px; 
            border: none; 
            border-radius: var(--radius-sm); 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer; 
            width: 100%;
        }
        .btn-primary { background: var(--brand-color); color: white; }

        .login-right { 
            flex: 1; 
            background: var(--brand-color); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            padding: 60px; 
        }

        @media (max-width: 768px) {
            .login-right { display: none; }
            .login-left { padding: 40px 24px; }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-left">
            <div class="login-logo"></div>
            
            <div class="login-form-container">
                <div class="profile-upload-container" onclick="document.getElementById('imageInput').click()">
                    <div class="profile-circle" id="profileDisplay">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)" />
                </div>

                <h1 class="login-title">Admin Login</h1>
                <p class="login-subtitle">Sign in to access your admin dashboard</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" id="loginEmail" placeholder="macaulayroyal17@gmail.com" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="loginPassword" placeholder="Enter password" required/>
                    </div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">Login to Admin Panel</button>
                </form>
            </div>
        </div>
        <div class="login-right">
            <div class="login-brand"></div>
            <p class="login-tagline"></p>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://ddrhpjiaotwtblnlqytw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkcmhwamlhb3R3dGJsbmxxeXR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTI0MjMsImV4cCI6MjA4ODMyODQyM30.GNb6OTErsgNbb0PlEysXD7BtUhkjk0ldQCPbO_5EsKU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const ADMIN_EMAIL = "macaulayroyal17@gmail.com";

    // 1. Handle Profile Image Selection & Preview
    async function handleImageSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const display = document.getElementById('profileDisplay');
            display.innerHTML = `<img src="${e.target.result}" alt="Admin Profile">`;
        }
        reader.readAsDataURL(file);

        const fileExt = file.name.split('.').pop();
        const filePath = `admins/profile_${Date.now()}.${fileExt}`;

        const { data, error } = await _supabase.storage
            .from('product-images') 
            .upload(filePath, file);

        if (error) console.error("Upload Error:", error.message);
    }

    // 2. Auth Logic
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');

        if (email !== ADMIN_EMAIL) {
            alert("Unauthorized Email.");
            return;
        }

        btn.innerText = "Verifying...";

        // Step A: Auth Sign In
        const { data: authData, error: authError } = await _supabase.auth.signInWithPassword({
            email, password
        });

        if (authError) {
            alert(authError.message);
            btn.innerText = "Login to Admin Panel";
            return;
        }

        // Step B: Check Admin Table
        const { data: adminCheck, error: tableError } = await _supabase
            .from('admins')
            .select('email')
            .eq('email', email)
            .single();

        if (adminCheck) {
            // Success: Save to LocalStorage
            localStorage.setItem('adminLoggedIn', 'true');
            localStorage.setItem('adminEmail', email); 
            
            const profileImg = document.querySelector('#profileDisplay img');
            if (profileImg) {
                localStorage.setItem('adminProfileImage', profileImg.src);
            }
            
            // Redirect
            window.location.href = 'dashboard.html';
        } else {
            alert("Access denied: Not found in admin records.");
            btn.innerText = "Login to Admin Panel";
        }
    });
</script>
</body>
</html>
